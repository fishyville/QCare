<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCare — Masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="auth-strip"></div>
  <div class="page">

    <div id="logo-mount"></div>

    <div class="auth-hero">
      <h2>Selamat datang kembali 👋</h2>
      <p>Masuk untuk melihat atau membuat jadwal antrian anda.</p>
    </div>

    <div class="field">
      <label>Alamat email</label>
      <input type="email" id="login-email" placeholder="email@contoh.com">
      <p class="err" id="err-email">Format email tidak valid</p>
    </div>

    <button class="btn-pink" onclick="doLogin()">
      Masuk ke akun
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <p class="hint">Demo: ketik email apapun lalu klik masuk</p>

    <div class="divider"><hr><span>Belum punya akun?</span><hr></div>

    <button class="btn-outline" onclick="window.location.href='register.html'">
      Buat akun baru
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </button>

  </div>
</div>

<script src="state.js"></script>
<script>
  /* Inject logo */
  document.getElementById('logo-mount').innerHTML = LOGO_HTML;

  /* If already logged in, go straight to app */
  State.load();
  if (State.data.user) window.location.href = 'app.html';

function doLogin() {
  const email = document.getElementById('login-email').value.trim();

  if (!email || !/\S+@\S+\.\S+/.test(email)) {
    show('err-email');
    return;
  }
  hide('err-email');

  State.load();

  // check if user already registered
  const found = (State.data.users || []).find(u => u.email === email);

  if (!found) {
    alert("Akun belum terdaftar. Silakan buat akun terlebih dahulu.");
    return;
  }

  // allow login only if registered
  State.data.user = found;
  State.save();
  State.data.users = State.data.users || [];
  window.location.href = 'app.html';
}
</script>
</body>
</html>
